<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workday Job Application - Two-Factor Authentication Fixture</title>
  <style>
    body { font-family: sans-serif; margin: 20px; text-align: center; }
    .card { border: 1px solid #d1d5db; padding: 30px; border-radius: 8px; max-width: 450px; margin: 40px auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    input[type="text"] { width: 200px; font-size: 1.5em; letter-spacing: 5px; text-align: center; padding: 10px; margin: 20px 0; }
    button { background: #0056b3; color: white; border: none; padding: 12px 24px; font-size: 1em; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card" id="two-factor-step" data-automation-id="twoFactorStep">
    <h1 data-automation-id="mfa-header">Two-Factor Authentication</h1>
    <h2>Authenticator Security Code</h2>
    <p>Enter the 6-digit OTP passcode generated by your authenticator app.</p>
    
    <form id="mfa-form" action="/verify-mfa" method="POST">
      <div class="form-group">
        <label for="mfaPasscode" style="display:block; font-weight:bold; margin-bottom:10px;">Two-Factor 2FA Verification Code</label>
        <input type="text" id="mfaPasscode" name="mfaPasscode" data-automation-id="two-factor-input" placeholder="000000" maxlength="6" required autofocus>
      </div>
      <div>
        <button type="submit" id="mfa-submit-button" data-automation-id="mfa-submit">Submit Passcode</button>
      </div>
    </form>
  </div>
</body>
</html>
