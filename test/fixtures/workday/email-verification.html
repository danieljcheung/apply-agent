<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workday Job Application - Email Verification Fixture</title>
  <style>
    body { font-family: sans-serif; margin: 20px; text-align: center; }
    .card { border: 1px solid #d1d5db; padding: 30px; border-radius: 8px; max-width: 450px; margin: 40px auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    input[type="text"] { width: 200px; font-size: 1.5em; letter-spacing: 5px; text-align: center; padding: 10px; margin: 20px 0; }
    button { background: #0056b3; color: white; border: none; padding: 12px 24px; font-size: 1em; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card" id="email-verification-step" data-automation-id="emailVerificationStep">
    <h1 data-automation-id="page-header">Verify Your Email Address</h1>
    <p>We sent a code to your email address (candidate@example.com). Please check your inbox.</p>
    
    <form id="email-verify-form" action="/verify-email" method="POST">
      <div class="form-group">
        <label for="verificationCode" style="display:block; font-weight:bold; margin-bottom:10px;">Email Verification Code (Confirm your email)</label>
        <input type="text" id="verificationCode" name="verificationCode" data-automation-id="email-verification-code-input" placeholder="123456" maxlength="6" required autofocus>
      </div>
      <div>
        <button type="submit" id="verify-button" data-automation-id="verify-email-submit">Verify Email</button>
      </div>
    </form>
  </div>
</body>
</html>
