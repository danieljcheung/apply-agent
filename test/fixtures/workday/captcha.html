<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workday Job Application - CAPTCHA Fixture</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    .captcha-container { border: 2px solid #e1e4e8; padding: 20px; background: #fafbfc; border-radius: 6px; text-align: center; max-width: 450px; margin: 30px 0; }
    .captcha-title { font-weight: bold; font-size: 1.1em; color: #24292e; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div id="workday-application-container" data-automation-id="workdayApplication">
    <h1>Security Check Required</h1>
    <p>Please solve the challenge below to proceed with your application.</p>
    
    <div class="captcha-container" id="captcha-box" data-automation-id="captcha-container">
      <div class="captcha-title">Bot Detection Verification</div>
      <div class="g-recaptcha" data-sitekey="6Ld_sample_workday_key_12345" data-automation-id="recaptcha-widget"></div>
      <iframe src="https://www.google.com/recaptcha/api2/bframe?hl=en&amp;v=r2026" title="recaptcha challenge" style="width: 300px; height: 100px; border: 0;"></iframe>
      <div class="h-captcha" data-sitekey="10000000-0000-0000-0000-000000000001"></div>
      <p class="captcha-prompt">Complete the CAPTCHA to prove you are human.</p>
    </div>

    <form id="workday-captcha-form" action="/verify-captcha" method="POST">
      <button type="submit" id="continue-button" data-automation-id="continue-button" disabled>Continue Application</button>
    </form>
  </div>
</body>
</html>
