apiVersion: v1
kind: Service
metadata:
  name: apply-agent-api
  namespace: apply-agent
  labels:
    app.kubernetes.io/name: apply-agent
    app.kubernetes.io/component: api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: apply-agent
    app.kubernetes.io/component: api
