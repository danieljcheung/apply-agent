# Secret template for apply-agent
# Copy this file to secret.yaml and update with base64 encoded credentials before applying.
# Secret contract:
#   DB_USER: Username for PostgreSQL database connection
#   DB_PASSWORD: Password for PostgreSQL database connection
#   VAULT_PASSWORD: Password for decrypting application vault on startup
#   PROTON_BRIDGE_USERNAME: Username for Proton mail bridge service
#   PROTON_BRIDGE_PASSWORD: Password for Proton mail bridge service
#   API_SECRET_KEY: Application encryption and signature secret key
apiVersion: v1
kind: Secret
metadata:
  name: apply-agent-secret
  namespace: apply-agent
  labels:
    app.kubernetes.io/name: apply-agent
    app.kubernetes.io/component: app
type: Opaque
stringData:
  DB_USER: "apply_user"
  DB_PASSWORD: "change_me_in_production"
  username: "apply_user"
  password: "change_me_in_production"
  VAULT_PASSWORD: "change_me_vault_password"
  PROTON_BRIDGE_USERNAME: "change_me_proton_username"
  PROTON_BRIDGE_PASSWORD: "change_me_proton_password"
  API_SECRET_KEY: "change_me_api_secret_key"
