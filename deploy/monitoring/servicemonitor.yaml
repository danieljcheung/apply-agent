apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: apply-agent-servicemonitor
  namespace: apply-agent
  labels:
    app.kubernetes.io/name: apply-agent
    app.kubernetes.io/component: app
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: apply-agent
      app.kubernetes.io/component: api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
